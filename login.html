<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixcom Wi-Fi Hotspot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin:0; padding:20px; text-align: center; }
        .card { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-bottom: 5px; }
        p { color: #5f6368; font-size: 14px; }
        .plan-btn { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #1a73e8; background: white; color: #1a73e8; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .plan-btn:hover { background: #1a73e8; color: white; }
        #qr-section { display: none; margin-top: 20px; }
        #qr-code { width: 200px; height: 200px; margin: 15px auto; }
        .status { font-weight: bold; color: #e37400; margin-top: 10px; }
    </style>
    <!-- QR Code Generator JS Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="card">
    <h2>Mixcom Wi-Fi</h2>
    <p>உங்களுக்கு தேவையான பிளானை தேர்ந்தெடுத்து UPI மூலம் பணம் செலுத்துங்கள்.</p>

    <!-- Plans Section -->
    <div id="plans-section">
        <button class="plan-btn" onclick="generatePayment(100, 'Monthly 4 Mbps')">₹100 - 4 Mbps (30 Days)</button>
        <button class="plan-btn" onclick="generatePayment(150, 'Monthly 6 Mbps')">₹150 - 6 Mbps (30 Days)</button>
        <button class="plan-btn" onclick="generatePayment(199, 'Monthly Super 6 Mbps')">₹199 - 6 Mbps (30 Days)</button>
        <button class="plan-btn" onclick="generatePayment(250, 'Monthly Pro 6 Mbps')">₹250 - 6 Mbps (30 Days)</button>
    </div>

    <!-- Hidden MikroTik Standard Form -->
    <form name="login" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
        <input type="text" id="username" name="username" value="" />
        <input type="password" id="password" name="password" value="" />
    </form>

    <!-- Dynamic QR Payment Section -->
    <div id="qr-section">
        <h3 id="plan-title"></h3>
        <p>GPay / PhonePe / Paytm மூலம் கீழே உள்ள QR-ஐ ஸ்கேன் செய்யுங்கள்</p>
        <div id="qr-code"></div>
        <p class="status" id="pay-status">Waiting for payment...</p>
    </div>
</div>

<script>
    // UpiServer User Token & MikroTik MAC Variable
    const USER_TOKEN = "3f8fb8ebd93d2cfab1bc213c189a61df"; 
    const CLIENT_MAC = "$(mac)"; 
    let orderId = "";
    let checkInterval = null;

    function generatePayment(amount, planName) {
        document.getElementById("plans-section").style.display = "none";
        document.getElementById("qr-section").style.display = "block";
        document.getElementById("plan-title").innerText = planName + " - ₹" + amount;

        orderId = Math.floor(1000000000 + Math.random() * 9000000000).toString();

        const formData = new URLSearchParams();
        formData.append("customer_mobile", "9876543210");
        formData.append("user_token", USER_TOKEN);
        formData.append("amount", amount.toString());
        formData.append("order_id", orderId);
        formData.append("redirect_url", window.location.href);
        formData.append("remark1", planName);
        formData.append("remark2", CLIENT_MAC);

        // CORS Proxy சேர்க்கப்பட்ட Target API URL
        const targetUrl = "https://upiserver.in/api/create-order";
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);

        fetch(proxyUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            console.log("Create Order Response:", data);
            if(data.status === true && data.result && data.result.payment_url) {
                document.getElementById("qr-code").innerHTML = "";
                
                // QR Code உருவாக்குதல்
                new QRCode(document.getElementById("qr-code"), {
                    text: data.result.payment_url,
                    width: 200,
                    height: 200
                });
                
                // 3 வினாடிக்கு ஒருமுறை Status Check
                checkInterval = setInterval(() => checkPaymentStatus(orderId), 3000);
            } else {
                alert("QR Generation Error: " + (data.message || "Something went wrong"));
            }
        })
        .catch(err => {
            console.error("Fetch Error:", err);
            alert("API Connection Error! Check Console.");
        });
    }

    function checkPaymentStatus(txnId) {
        const checkData = new URLSearchParams();
        checkData.append("user_token", USER_TOKEN);
        checkData.append("order_id", txnId);

        const targetCheckUrl = "https://upiserver.in/api/check-order-status";
        const proxyCheckUrl = "https://corsproxy.io/?" + encodeURIComponent(targetCheckUrl);

        fetch(proxyCheckUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: checkData
        })
        .then(res => res.json())
        .then(data => {
            console.log("Status Check Response:", data);
            if(data.status === "COMPLETED" || data.status === true) {
                clearInterval(checkInterval);
                document.getElementById("pay-status").innerText = "Payment Successful! Connecting WiFi...";
                document.getElementById("pay-status").style.color = "green";

                autoLoginMikroTik();
            }
        })
        .catch(err => console.error("Status Check Error:", err));
    }

    function autoLoginMikroTik() {
        document.getElementById("username").value = CLIENT_MAC;
        document.getElementById("password").value = CLIENT_MAC;
        setTimeout(() => {
            document.forms["login"].submit();
        }, 1000);
    }
</script>

</body>
</html>
